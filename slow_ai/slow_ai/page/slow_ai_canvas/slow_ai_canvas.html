<div class="slow-ai-canvas" data-page="slow-ai-canvas">
	<div class="slow-ai-canvas__toolbar">
		<div class="slow-ai-canvas__draft-controls" data-role="draft-controls"></div>
		<div class="slow-ai-canvas__state-row">
			<div class="slow-ai-canvas__status" data-role="status">Idle</div>
			<div class="slow-ai-canvas__run" data-role="run">No run selected</div>
		</div>
	</div>
	<div class="slow-ai-canvas__body">
		<aside class="slow-ai-canvas__panel slow-ai-canvas__palette">
			<div class="slow-ai-canvas__panel-head">Nodes</div>
			<div data-role="node-palette" class="slow-ai-canvas__node-list"></div>
			<div class="slow-ai-canvas__panel-head">Template Library</div>
			<div data-role="template-library" class="slow-ai-canvas__template-library"></div>
			<div data-role="template-preview" class="slow-ai-canvas__template-preview"></div>
			<div class="slow-ai-canvas__panel-head">Tool Mode</div>
			<div data-role="tool-mode" class="slow-ai-canvas__tool-mode"></div>
			<div class="slow-ai-canvas__panel-head">Provider Accounts</div>
			<div data-role="provider-accounts" class="slow-ai-canvas__provider-accounts"></div>
		</aside>
		<section class="slow-ai-canvas__stage-wrap">
			<div class="slow-ai-canvas__stage" data-role="stage">
				<svg class="slow-ai-canvas__edges" data-role="edges"></svg>
				<div class="slow-ai-canvas__nodes" data-role="nodes"></div>
			</div>
		</section>
		<aside class="slow-ai-canvas__panel slow-ai-canvas__inspector">
			<div class="slow-ai-canvas__panel-head">Graph Editor</div>
			<div data-role="draft-warnings" class="slow-ai-canvas__draft-warnings"></div>
			<div data-role="node-editor" class="slow-ai-canvas__node-editor"></div>
			<div data-role="edge-editor" class="slow-ai-canvas__edge-editor"></div>
			<div data-role="edge-list" class="slow-ai-canvas__edge-list"></div>
			<div class="slow-ai-canvas__panel-head">Run Monitor</div>
			<div data-role="queue-summary" class="slow-ai-canvas__metric-row"></div>
			<div data-role="run-summary" class="slow-ai-canvas__summary"></div>
			<div class="slow-ai-canvas__panel-head">Provider Jobs</div>
			<div data-role="provider-jobs" class="slow-ai-canvas__provider-jobs"></div>
			<div class="slow-ai-canvas__panel-head">Cost Summary</div>
			<div data-role="ledger-summary" class="slow-ai-canvas__ledger-summary"></div>
			<div class="slow-ai-canvas__panel-head">Errors</div>
			<div data-role="run-errors" class="slow-ai-canvas__run-errors"></div>
			<div class="slow-ai-canvas__panel-head">Run Timeline</div>
			<div data-role="run-timeline" class="slow-ai-canvas__run-timeline"></div>
			<div class="slow-ai-canvas__panel-head">Run History</div>
			<div data-role="history" class="slow-ai-canvas__history"></div>
			<div class="slow-ai-canvas__panel-head">Asset Output</div>
			<div data-role="asset-output" class="slow-ai-canvas__asset-output"></div>
		</aside>
	</div>
</div>
