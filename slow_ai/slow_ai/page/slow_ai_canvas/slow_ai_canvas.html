<div class="slow-ai-canvas" data-page="slow-ai-canvas">
	<div class="slow-ai-canvas__toolbar">
		<div class="slow-ai-canvas__status" data-role="status">Idle</div>
		<div class="slow-ai-canvas__run" data-role="run">No run selected</div>
	</div>
	<div class="slow-ai-canvas__body">
		<aside class="slow-ai-canvas__panel slow-ai-canvas__palette">
			<div class="slow-ai-canvas__panel-head">Nodes</div>
			<div data-role="node-palette" class="slow-ai-canvas__node-list"></div>
		</aside>
		<section class="slow-ai-canvas__stage-wrap">
			<div class="slow-ai-canvas__stage" data-role="stage">
				<svg class="slow-ai-canvas__edges" data-role="edges"></svg>
				<div class="slow-ai-canvas__nodes" data-role="nodes"></div>
			</div>
		</section>
		<aside class="slow-ai-canvas__panel slow-ai-canvas__inspector">
			<div class="slow-ai-canvas__panel-head">Run Monitor</div>
			<div data-role="queue-summary" class="slow-ai-canvas__metric-row"></div>
			<div data-role="run-summary" class="slow-ai-canvas__summary"></div>
			<div class="slow-ai-canvas__panel-head">Run History</div>
			<div data-role="history" class="slow-ai-canvas__history"></div>
			<div class="slow-ai-canvas__panel-head">Asset Output</div>
			<div data-role="asset-output" class="slow-ai-canvas__asset-output"></div>
		</aside>
	</div>
</div>
